services:
  app:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - RISING_SUN_RAPIDOCR_USE_CUDA=0
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
