name: Build standalone executables

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: RisingSun-linux-x86_64
          - os: windows-latest
            artifact: RisingSun-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build frontend
        working-directory: web/frontend
        env:
          VITE_API_BASE_URL: ""
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Install Python dependencies (CPU PyTorch)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install fastapi "uvicorn[standard]" httpx lxml Pillow python-multipart transformers accelerate sentencepiece
          python -m pip install pymupdf rapidocr-onnxruntime opencv-python-headless numpy openpyxl pandas pyyaml rich typer
          python -m pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean rising_sun.spec

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist RisingSun

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist\RisingSun -DestinationPath ${{ matrix.artifact }}.zip

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\installer | Out-Null
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            throw "ISCC not found at $iscc"
          }

          $sourceDir = (Resolve-Path 'dist\RisingSun').Path
          $outputDir = (Resolve-Path 'dist\installer').Path

          & $iscc "/DMyAppVersion=${{ github.ref_name }}" "/DSourceDir=$sourceDir" "/DOutputDir=$outputDir" "/DOutputBaseFilename=RisingSun-windows-x86_64-setup" "packaging\windows\RisingSun.iss"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
            dist/installer/*.exe
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: RisingSun-*
          path: release-assets
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
