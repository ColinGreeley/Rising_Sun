name: Build standalone executables

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: RisingSun-linux-x86_64
          - os: windows-latest
            artifact: RisingSun-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Python dependencies (CPU PyTorch)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install fastapi "uvicorn[standard]" httpx lxml Pillow transformers accelerate sentencepiece
          pip install pymupdf rapidocr-onnxruntime opencv-python-headless numpy openpyxl pandas pyyaml rich typer
          pip install pyinstaller

      - name: Build frontend
        working-directory: web/frontend
        env:
          VITE_API_BASE_URL: ""
        run: |
          npm ci
          npm run build

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean rising_sun.spec

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist RisingSun

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist\RisingSun -DestinationPath ${{ matrix.artifact }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: error

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
